name: Daily AI News Pipeline

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-package-lock
      - name: Run daily pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: node scripts/runDaily.js
      - name: Commit updated data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/marcT1/ai-news-dashboard/contents/data/latest.json" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))")
          CONTENT=$(base64 -w 0 data/latest.json)
          RESULT=$(curl -s -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/marcT1/ai-news-dashboard/contents/data/latest.json" \
            -d "{\"message\":\"chore: update AI news data [$(date -u +'%Y-%m-%d %H:%M UTC')]\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\"}")
          echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); print('SUCCESS:', r['content']['name'] if 'content' in r else r)"
